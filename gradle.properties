kotlin.code.style=official

# The Kotlin JS target does not support Gradle configuration-on-demand (KT-52074); the zoned plugin
# also can't auto-configure the JS bundle under it. Keep it off (it may be on in ~/.gradle).
org.gradle.configureondemand=false

# The Kotlin/JS IR compiler (esp. compiling the test executable with the kotlin-browser wrappers)
# needs more heap than the default; give the Kotlin compiler daemon room so CI doesn't OOM.
kotlin.daemon.jvmargs=-Xmx4g
